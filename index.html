<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Олеся и Артём · 17.07.2026</title>
  <link rel="stylesheet" href="colors_and_type.css">
  <style>
    html, body { margin: 0; background: var(--stone); }
    /* Mobile-first wrapper — the invitation column sits on a stone background on wider screens */
    .invitation-shell {
      max-width: 480px;
      margin: 0 auto;
      background: var(--ivory);
      min-height: 100vh;
      position: relative;
      padding-bottom: 96px;
      box-shadow: 0 30px 80px -20px rgba(0,0,0,.18);
      isolation: isolate;
    }
    /* One continuous botanical backdrop for the whole invitation —
       sits behind every section so there are no seams between them.
       Hero paints its own animated copy on top of this. */
    .invitation-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url('assets/botanical-shadow.svg');
      background-size: 100% auto;
      background-repeat: repeat-y;
      background-position: top center;
      mix-blend-mode: multiply;
      opacity: 0.42;
      pointer-events: none;
      z-index: 0;
    }
    .invitation-shell > * { position: relative; z-index: 1; }
    @media (max-width: 520px) {
      .invitation-shell { box-shadow: none; }
      body { background: var(--ivory); }
    }
    section { scroll-margin-top: 24px; position: relative; }
    .botanical-overlay {
      position: absolute; inset: 0;
      background-image: url('assets/botanical-shadow.svg');
      background-size: cover;
      background-position: center;
      mix-blend-mode: multiply;
      pointer-events: none;
      z-index: 0;
    }
    .reveal {
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 700ms cubic-bezier(0, 0, 0.2, 1), transform 700ms cubic-bezier(0, 0, 0.2, 1);
    }
    .reveal.is-in { opacity: 1; transform: translateY(0); }
    @media (prefers-reduced-motion: reduce) {
      .reveal { opacity: 1; transform: none; transition: none; }
    }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="parts/Primitives.jsx"></script>
  <script type="text/babel" src="parts/DesktopNotice.jsx"></script>
  <script type="text/babel" src="parts/Hero.jsx"></script>
  <script type="text/babel" src="parts/Greeting.jsx"></script>
  <script type="text/babel" src="parts/DateBlock.jsx"></script>
  <script type="text/babel" src="parts/Events.jsx"></script>
  <script type="text/babel" src="parts/Schedule.jsx"></script>
  <script type="text/babel" src="parts/RSVP.jsx"></script>
  <script type="text/babel" src="parts/Details.jsx"></script>
  <script type="text/babel" src="parts/Closing.jsx"></script>
  <script type="text/babel" src="parts/BottomNav.jsx"></script>
  <script type="text/babel">
    function App() {
      // simple intersection observer for fade-up reveals
      React.useEffect(() => {
        const io = new IntersectionObserver((entries) => {
          entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('is-in'); });
        }, { threshold: 0.12 });
        document.querySelectorAll('.reveal').forEach(el => io.observe(el));
        return () => io.disconnect();
      }, []);
      return (
        <div className="invitation-shell">
          <Hero />
          <Greeting />
          <DateBlock />
          <CeremonyCard />
          <BanquetCard />
          <Details />
          <RSVP />
          <Closing />
          <BottomNav />
          <DesktopNotice />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
